<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact form</title>
</head>
<body>
    <h2>Contact us</h2>
    <label for="fname">First Name*</label><br>
    <input type="text" id="fname" name="fname" value="Maryam"><br><br>
    <label for="lname">Last Name*</label><br>
    <input type="text" id="lname" name="lname" value="Adetoro"><br><br>
    <label for="email"> Email Address*</label><br>
    <input type="text" id="email" name="email" value="maryam12@gmail.com"><br><br>
    <p>Query Type*</p>
    <input type="radio" id="general enquiry" name="general enquiry"><br>
    <label for="general enquiry">General Enquiry</label><br>
    <input type="radio" id="support request" name="support request"><br>
    <label for="support request">Support Request</label><br><br>
    <label for="message">Message*</label><br>
    <input type="text" id="message" name="message"><br><br><br>
    <input type="checkbox" id="consent" name="consent"><br>
    <label for="consent">I consent to being contacted by the team*</label><br><br><br>
    <button style="background-color: green; color: aliceblue;">Submit</button>
</body>
</html>
